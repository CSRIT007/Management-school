# EC2 simple production stack (web + api + postgres on one server).
# Usage: cp .env.prod.example .env  →  edit .env  →  ./scripts/deploy.sh
#
# For AWS RDS later, use docker-compose.rds.yml instead (no db service here).

services:
  db:
    image: postgres:16-alpine
    container_name: management-school-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-management_school}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d management_school']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: management-school-api:prod
    container_name: management-school-api
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-management_school}}
      PUBLIC_URL: ${PUBLIC_URL:?Set PUBLIC_URL in .env (e.g. http://YOUR_EC2_IP)}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production}
    expose:
      - '4000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: management-school-web:prod
    container_name: management-school-web
    ports:
      - '0.0.0.0:${WEB_PORT:-80}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
