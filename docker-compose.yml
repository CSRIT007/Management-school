services:
  db:
    image: postgres:16-alpine
    container_name: management-school-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-management_school}
    ports:
      # Database: local machine only (DBeaver) — NOT exposed to public internet
      - "127.0.0.1:5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d management_school"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: saroeurnchea/management-school-api:latest
    container_name: management-school-api
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      TZ: Asia/Phnom_Penh
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-management_school}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production}
    expose:
      - "4000"
    # Do NOT publish host :4000 here — it steals traffic from `npm run server`
    # (Vite proxies to 127.0.0.1:4000). Use npm run server + npm run dev for local API,
    # or open http://localhost:8080 for the Docker stack (nginx → api on the compose network).
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: saroeurnchea/management-school-web:latest
    container_name: management-school-web
    ports:
      # App: bind all interfaces so public IP / LAN can reach it
      - "0.0.0.0:${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
